# actionlint config — declare the self-hosted runner labels used by the hermetic
# Nix runner (nix/gha-runner). Without this, actionlint errors on
# `runs-on: [self-hosted, flexnetos, nix]`.
# Precedent: cognitum-open-design/.github/actionlint.yaml (rUv repo).
self-hosted-runner:
  labels:
    - flexnetos
    - nix
