# GitHub Actions harness: archbp-env-test
# Generated by metaharness (host: github-actions, ADR-033), then REWRITTEN for the
# hermetic self-hosted Nix runner (nix/gha-runner). Only `runs-on` changed from the
# ADR-033 default `ubuntu-latest`; the composite action does the setup-node/npm-ci
# removal. See nix/gha-runner/DESIGN.md §2.
name: archbp-env-test

on:
  workflow_dispatch: {}
  issue_comment:
    types: [created]

# ADR-022 default-deny: contents:read only. Widen via the harness policy.
permissions:
  contents: read

jobs:
  archbp-env-test:
    # Executes on the hermetic Nix runner registered to FlexNetOS with these labels.
    runs-on: [self-hosted, flexnetos, nix]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/archbp-env-test
        with:
          task: ${{ github.event.comment.body || github.event_name }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
