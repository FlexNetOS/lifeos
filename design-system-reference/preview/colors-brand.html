<!doctype html>
<html><head><meta charset="utf-8">
<title>Brand colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-0);color:var(--fg-1);font-family:var(--font-sans);}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:20px;height:170px;box-sizing:border-box;}
  .sw{border-radius:14px;padding:14px;display:flex;flex-direction:column;justify-content:space-between;color:#0a0a0a;position:relative;overflow:hidden;}
  .sw .name{font-weight:600;font-size:13px;letter-spacing:.04em;text-transform:uppercase;}
  .sw .hex{font-family:var(--font-mono);font-size:13px;}
  .sw .role{font-size:11px;opacity:.6;}
  .cy{background:var(--lifeos-cyan);}
  .pp{background:var(--lifeos-purple);}
  .gr{background:var(--lifeos-green);}
</style></head>
<body>
<div class="row">
  <div class="sw cy">
    <div><div class="name">Cyan</div><div class="role">Primary · actions, focus, links</div></div>
    <div class="hex">#00D4FF</div>
  </div>
  <div class="sw pp">
    <div><div class="name">Purple</div><div class="role">Secondary · AI, memory</div></div>
    <div class="hex">#9B7BFF</div>
  </div>
  <div class="sw gr">
    <div><div class="name">Green</div><div class="role">Accent · success, live</div></div>
    <div class="hex">#00E676</div>
  </div>
</div>
</body></html>
