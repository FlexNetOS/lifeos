<!doctype html>
<html><head><meta charset="utf-8">
<title>Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-0);color:var(--fg-1);font-family:var(--font-sans);}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;padding:20px;height:170px;box-sizing:border-box;}
  .sw{border-radius:10px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;font-family:var(--font-sans);color:var(--fg-2);font-size:11px;border:1px solid rgba(255,255,255,.04);}
  .sw .name{font-weight:600;color:var(--fg-1);font-size:12px;}
  .sw .hex{font-family:var(--font-mono);}
  .s0{background:#000;}
  .s1{background:var(--bg-0);}
  .s2{background:var(--bg-1);}
  .s3{background:var(--bg-2);}
  .s4{background:var(--bg-3);}
  .s5{background:var(--bg-4);}
</style></head>
<body>
<div class="grid">
  <div class="sw s0"><div class="name">black</div><div class="hex">#000000</div></div>
  <div class="sw s1"><div class="name">bg-0 page</div><div class="hex">#0A0A0A</div></div>
  <div class="sw s2"><div class="name">bg-1 panel</div><div class="hex">#121212</div></div>
  <div class="sw s3"><div class="name">bg-2 card</div><div class="hex">#1A1A1A</div></div>
  <div class="sw s4"><div class="name">bg-3 hover</div><div class="hex">#232323</div></div>
  <div class="sw s5"><div class="name">bg-4 border</div><div class="hex">#2A2A2A</div></div>
</div>
</body></html>
