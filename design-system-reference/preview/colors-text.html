<!doctype html>
<html><head><meta charset="utf-8">
<title>Text scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-0);font-family:var(--font-sans);}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;padding:20px;height:170px;box-sizing:border-box;}
  .sw{background:var(--bg-2);border:1px solid var(--bg-4);border-radius:10px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;font-size:11px;}
  .sw .name{font-weight:600;font-size:12px;}
  .sw .demo{font-size:24px;font-weight:600;letter-spacing:-.01em;}
  .sw .hex{font-family:var(--font-mono);color:var(--fg-3);}
  .l0{color:var(--fg-0);} .l1{color:var(--fg-1);} .l2{color:var(--fg-2);}
  .l3{color:var(--fg-3);} .l4{color:var(--fg-4);} .l5{color:var(--fg-5);}
</style></head>
<body>
<div class="grid">
  <div class="sw"><div class="l0"><div class="name">fg-0</div><div class="demo">Aa</div></div><div class="hex">#FFFFFF</div></div>
  <div class="sw"><div class="l1"><div class="name">fg-1</div><div class="demo">Aa</div></div><div class="hex">#ECEDEE</div></div>
  <div class="sw"><div class="l2"><div class="name">fg-2</div><div class="demo">Aa</div></div><div class="hex">#B5B7BA</div></div>
  <div class="sw"><div class="l3"><div class="name">fg-3</div><div class="demo">Aa</div></div><div class="hex">#9BA1A6</div></div>
  <div class="sw"><div class="l4"><div class="name">fg-4</div><div class="demo">Aa</div></div><div class="hex">#6B6F74</div></div>
  <div class="sw"><div class="l5"><div class="name">fg-5</div><div class="demo">Aa</div></div><div class="hex">#3F4348</div></div>
</div>
</body></html>
