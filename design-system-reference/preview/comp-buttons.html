<!doctype html>
<html><head><meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@0.475.0/dist/umd/lucide.min.js"></script>
<style>
  html,body{margin:0;background:var(--bg-0);color:var(--fg-1);font-family:var(--font-sans);padding:20px;box-sizing:border-box;}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .row + .row{margin-top:14px;}
  button{font-family:inherit;font-size:13px;font-weight:500;border-radius:8px;border:1px solid transparent;padding:0 16px;height:36px;display:inline-flex;align-items:center;gap:8px;cursor:pointer;transition:all .15s;}
  .primary{background:var(--lifeos-cyan);color:#0a0a0a;}
  .primary:hover{background:var(--lifeos-cyan-hi);box-shadow:var(--shadow-glow-cyan);}
  .secondary{background:var(--bg-2);color:var(--fg-1);border-color:var(--bg-4);}
  .secondary:hover{background:var(--bg-3);}
  .ghost{background:transparent;color:var(--lifeos-cyan);border-color:var(--lifeos-cyan);box-shadow:0 0 0 1px rgba(0,212,255,.2), 0 0 12px rgba(0,212,255,.25);}
  .ghost:hover{background:rgba(0,212,255,.1);color:var(--fg-0);}
  .gradient{background:var(--gradient-spiral);color:#0a0a0a;font-weight:600;}
  .danger{background:transparent;color:var(--status-err);border-color:rgba(255,77,106,.3);}
  .danger:hover{background:rgba(255,77,106,.1);}
  .sm{height:28px;padding:0 12px;font-size:12px;}
  .lg{height:44px;padding:0 22px;font-size:14px;}
  .icon-only{width:36px;padding:0;justify-content:center;}
  svg{width:14px;height:14px;}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-4);width:80px;}
</style></head>
<body>
<div class="row"><span class="lbl">default</span>
  <button class="primary"><i data-lucide="sparkles"></i>Run agent</button>
  <button class="secondary">Cancel</button>
  <button class="ghost">Skip</button>
  <button class="gradient"><i data-lucide="zap"></i>Upgrade</button>
  <button class="danger"><i data-lucide="trash-2"></i>Delete</button>
</div>
<div class="row"><span class="lbl">sizes</span>
  <button class="primary sm">Small</button>
  <button class="primary">Default</button>
  <button class="primary lg">Large</button>
  <button class="secondary icon-only"><i data-lucide="settings"></i></button>
  <button class="ghost icon-only"><i data-lucide="more-horizontal"></i></button>
</div>
<script>lucide.createIcons();</script>
</body></html>
