<!doctype html>
<html><head><meta charset="utf-8">
<title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@0.475.0/dist/umd/lucide.min.js"></script>
<style>
  html,body{margin:0;background:var(--bg-0);color:var(--fg-1);font-family:var(--font-sans);padding:20px;box-sizing:border-box;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .field{position:relative;display:flex;align-items:center;background:#000;border:1px solid var(--bg-4);border-radius:8px;padding:0 12px;height:40px;}
  .field:focus-within{border-color:var(--lifeos-cyan);box-shadow:0 0 0 3px rgba(0,212,255,.15);}
  .field input{flex:1;background:transparent;border:0;outline:0;color:var(--fg-1);font:inherit;font-size:13px;}
  .field input::placeholder{color:var(--fg-4);}
  .field svg{width:14px;height:14px;color:var(--fg-3);margin-right:8px;}
  kbd{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);background:var(--bg-2);border:1px solid var(--bg-4);border-radius:4px;padding:2px 6px;}
  .label{font-size:11px;color:var(--fg-3);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.06em;font-weight:600;}
  .toggle{width:36px;height:20px;background:var(--bg-3);border-radius:999px;position:relative;cursor:pointer;}
  .toggle.on{background:var(--lifeos-cyan);}
  .toggle::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:999px;background:#fff;transition:transform .15s;}
  .toggle.on::after{transform:translateX(16px);}
  .switch-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg-2);border:1px solid var(--bg-4);border-radius:8px;padding:8px 12px;height:40px;}
  .switch-row span{font-size:13px;}
</style></head>
<body>
<div class="grid">
  <div>
    <label class="label">Search</label>
    <div class="field"><i data-lucide="search"></i><input placeholder="Search or press ⌘K…"><kbd>⌘K</kbd></div>
  </div>
  <div>
    <label class="label">Focused</label>
    <div class="field" style="border-color:var(--lifeos-cyan);box-shadow:0 0 0 3px rgba(0,212,255,.15);"><i data-lucide="mail"></i><input value="hello@lifeos.ai"></div>
  </div>
  <div>
    <label class="label">Toggle (off)</label>
    <div class="switch-row"><span>Voice commands</span><div class="toggle"></div></div>
  </div>
  <div>
    <label class="label">Toggle (on)</label>
    <div class="switch-row"><span>Notifications</span><div class="toggle on"></div></div>
  </div>
</div>
<script>lucide.createIcons();</script>
</body></html>
