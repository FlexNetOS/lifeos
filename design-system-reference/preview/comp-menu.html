<!doctype html>
<html><head><meta charset="utf-8">
<title>Sidebar menu item</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@0.475.0/dist/umd/lucide.min.js"></script>
<style>
  html,body{margin:0;background:var(--bg-0);color:var(--fg-1);font-family:var(--font-sans);padding:18px;box-sizing:border-box;}
  .panel{background:var(--bg-0);border:1px solid var(--bg-4);border-radius:12px;padding:6px;width:340px;}
  .section{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);padding:8px 12px 4px;}
  .row{display:flex;align-items:center;gap:10px;height:40px;padding:0 12px;border-radius:8px;cursor:pointer;transition:background .15s;}
  .row:hover{background:var(--bg-2);}
  .row.active{background:rgba(0,212,255,.1);box-shadow:inset 2px 0 0 var(--lifeos-cyan);}
  .row.active .label{color:var(--lifeos-cyan);}
  .row.active svg.lead{color:var(--lifeos-cyan);}
  .row .label{flex:1;font-size:13px;color:var(--fg-1);font-weight:500;}
  .row .meta{font-size:11px;color:var(--fg-3);}
  .row svg.lead{width:16px;height:16px;color:var(--fg-1);}
  .row svg.chev{width:14px;height:14px;color:var(--fg-3);}
  .dot{width:8px;height:8px;border-radius:999px;background:var(--lifeos-green);box-shadow:0 0 8px var(--lifeos-green);animation:p 1.8s infinite;}
  @keyframes p{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.7}}
  .meta-row{display:flex;flex-direction:column;gap:1px;flex:1;}
  .meta-row .label{font-size:13px;font-weight:500;}
  .meta-row .sub{font-size:11px;color:var(--fg-3);}
  .row.active .meta-row .sub{color:rgba(0,212,255,.7);}
  .divider{height:1px;background:var(--bg-4);margin:6px 12px;}
</style></head>
<body>
<div class="panel">
  <div class="section">Your AI</div>
  <div class="row active">
    <i data-lucide="bot" class="lead"></i>
    <div class="meta-row">
      <div class="label">LifeOS</div>
      <div class="sub">Always on · running your day</div>
    </div>
    <span class="dot"></span>
  </div>

  <div class="divider"></div>

  <div class="section">Workspace</div>
  <div class="row">
    <i data-lucide="brain" class="lead"></i>
    <span class="label">Knowledge</span>
    <i data-lucide="chevron-right" class="chev"></i>
  </div>
  <div class="row">
    <i data-lucide="workflow" class="lead"></i>
    <span class="label">Automations</span>
    <i data-lucide="chevron-right" class="chev"></i>
  </div>
  <div class="row">
    <i data-lucide="calendar" class="lead"></i>
    <span class="label">Agenda</span>
    <i data-lucide="chevron-right" class="chev"></i>
  </div>
</div>
<script>lucide.createIcons();</script>
</body></html>
