<!doctype html>
<html><head><meta charset="utf-8">
<title>Work / Personal / Home icon triad</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#000;color:var(--fg-1);font-family:var(--font-sans);padding:18px;box-sizing:border-box;}
  .row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;align-items:center;}
  .tile{display:flex;flex-direction:column;align-items:center;gap:10px;padding:10px 6px;border-radius:14px;border:1px solid var(--bg-4);background:var(--bg-1);}
  .tile img{width:100%;max-width:130px;height:auto;}
  .tile .name{font-family:var(--font-display);letter-spacing:.18em;font-size:13px;}
  .tile.cyan .name   { color:var(--lifeos-cyan); }
  .tile.purple .name { color:var(--lifeos-purple); }
  .tile.green .name  { color:var(--lifeos-green); }
  .tile .role{font-size:11px;color:var(--fg-3);font-family:var(--font-mono);}
</style></head>
<body>
<div class="row">
  <div class="tile cyan">
    <img src="../assets/icons/work-on-black.png" alt="Work">
    <div class="name">WORK</div>
    <div class="role">cyan · productivity</div>
  </div>
  <div class="tile purple">
    <img src="../assets/icons/personal-on-black.png" alt="Personal">
    <div class="name">PERSONAL</div>
    <div class="role">purple · life</div>
  </div>
  <div class="tile green">
    <img src="../assets/icons/home-on-black.png" alt="Home">
    <div class="name">HOME</div>
    <div class="role">green · home automation</div>
  </div>
</div>
</body></html>
