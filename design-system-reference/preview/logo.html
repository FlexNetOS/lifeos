<!doctype html>
<html><head><meta charset="utf-8">
<title>LifeOS — Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#000;color:var(--fg-1);font-family:var(--font-sans);}
  .wrap{display:grid;grid-template-columns:170px 1fr;gap:24px;align-items:center;padding:20px 24px;height:150px;box-sizing:border-box;}
  .mark{width:140px;height:140px;display:flex;align-items:center;justify-content:center;}
  .mark img{width:100%;height:100%;object-fit:contain;}
  .wordmark{font-family:var(--font-display);font-size:54px;letter-spacing:.06em;}
  .wordmark .life{background:var(--gradient-spiral);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .wordmark .os{color:var(--fg-2);}
  .tag{color:var(--fg-3);font-size:13px;letter-spacing:.04em;margin-top:6px;}
  .meta{display:flex;gap:12px;margin-top:14px;}
  .meta span{font-size:11px;color:var(--fg-4);font-family:var(--font-mono);}
  .meta span b{color:var(--fg-2);font-weight:500;}
</style></head>
<body>
<div class="wrap">
  <div class="mark"><img src="../assets/lifeos-mark.png" alt=""></div>
  <div>
    <div class="wordmark"><span class="life">LIFE</span><span class="os">OS</span></div>
    <div class="tag">Work · Personal · Home — one operating system.</div>
    <div class="meta">
      <span><b>Mark</b> Triad emblem</span>
      <span><b>Type</b> Rigelstar</span>
      <span><b>Min size</b> 32px</span>
    </div>
  </div>
</div>
</body></html>
