<!doctype html>
<html><head><meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-0);color:var(--fg-1);font-family:var(--font-sans);padding:20px;height:170px;box-sizing:border-box;}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;align-items:center;justify-items:center;}
  .col{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .box{width:78px;height:78px;background:var(--bg-2);border:1px solid var(--bg-4);}
  .box.cap{background:var(--gradient-spiral);width:120px;height:36px;border:0;}
  .val{font-family:var(--font-mono);font-size:11px;color:var(--fg-1);}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);}
  .r-xs{border-radius:4px;}.r-sm{border-radius:6px;}.r-md{border-radius:8px;}
  .r-lg{border-radius:12px;}.r-xl{border-radius:16px;}
</style></head>
<body>
<div class="grid">
  <div class="col"><div class="box r-xs"></div><div class="val">4</div><div class="lbl">--radius-xs</div></div>
  <div class="col"><div class="box r-sm"></div><div class="val">6</div><div class="lbl">--radius-sm</div></div>
  <div class="col"><div class="box r-md"></div><div class="val">8</div><div class="lbl">--radius-md</div></div>
  <div class="col"><div class="box r-lg"></div><div class="val">12</div><div class="lbl">--radius-lg</div></div>
  <div class="col"><div class="box r-xl"></div><div class="val">16</div><div class="lbl">--radius-xl</div></div>
  <div class="col"><div class="box cap" style="border-radius:999px;"></div><div class="val">999</div><div class="lbl">--radius-capsule</div></div>
</div>
</body></html>
