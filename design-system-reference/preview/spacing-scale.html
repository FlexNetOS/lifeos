<!doctype html>
<html><head><meta charset="utf-8">
<title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-0);color:var(--fg-1);font-family:var(--font-sans);padding:20px;height:170px;box-sizing:border-box;}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;align-items:end;height:100%;}
  .bar{background:linear-gradient(180deg,var(--lifeos-cyan),var(--lifeos-purple));border-radius:4px 4px 0 0;}
  .col{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .col .label{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);}
  .col .val{font-family:var(--font-mono);font-size:11px;color:var(--fg-1);}
  .s1{height:4px;}.s2{height:8px;}.s3{height:12px;}.s4{height:16px;}
  .s5{height:24px;}.s6{height:32px;}.s7{height:64px;}
  .bar{width:100%;}
</style></head>
<body>
<div class="grid">
  <div class="col"><div class="bar s1"></div><div class="val">4</div><div class="label">space-1</div></div>
  <div class="col"><div class="bar s2"></div><div class="val">8</div><div class="label">space-2</div></div>
  <div class="col"><div class="bar s3"></div><div class="val">12</div><div class="label">space-3</div></div>
  <div class="col"><div class="bar s4"></div><div class="val">16</div><div class="label">space-4</div></div>
  <div class="col"><div class="bar s5"></div><div class="val">24</div><div class="label">space-6</div></div>
  <div class="col"><div class="bar s6"></div><div class="val">32</div><div class="label">space-8</div></div>
  <div class="col"><div class="bar s7"></div><div class="val">64</div><div class="label">space-16</div></div>
</div>
</body></html>
