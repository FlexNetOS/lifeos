<!doctype html>
<html><head><meta charset="utf-8">
<title>Mono — JetBrains Mono</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-0);color:var(--fg-1);font-family:var(--font-sans);padding:20px;box-sizing:border-box;}
  .grid{display:grid;grid-template-columns:1fr 220px;gap:20px;align-items:center;}
  .demo{display:flex;flex-direction:column;gap:10px;}
  kbd{font-family:var(--font-mono);font-size:11px;color:var(--fg-2);background:var(--bg-2);border:1px solid var(--bg-4);border-radius:6px;padding:3px 7px;}
  .row{display:flex;align-items:center;gap:8px;}
  .code{font-family:var(--font-mono);font-size:13px;color:var(--lifeos-cyan);}
  .tok{font-family:var(--font-mono);font-size:12px;color:var(--fg-2);}
  .name{font-weight:600;font-size:14px;}
  .note{font-size:12px;color:var(--fg-3);margin-top:4px;line-height:1.5;}
  .spec{font-family:var(--font-mono);font-size:11px;color:var(--fg-2);margin-top:8px;}
</style></head>
<body>
<div class="grid">
  <div class="demo">
    <div class="row"><kbd>⌘</kbd><kbd>K</kbd><span style="color:var(--fg-3);font-size:13px;">— Open quick switcher</span></div>
    <div class="code">--lifeos-cyan: #00D4FF;</div>
    <div class="tok">0123456789 · {} () [] &lt;/&gt; &amp;&amp; ==&gt;</div>
  </div>
  <div>
    <div class="name">JetBrains Mono</div>
    <div class="note">Shortcuts, tokens, status,<br>code blocks.</div>
    <div class="spec">var(--font-mono)</div>
  </div>
</div>
</body></html>
