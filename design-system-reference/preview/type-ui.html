<!doctype html>
<html><head><meta charset="utf-8">
<title>UI type — Lexend</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-0);color:var(--fg-1);font-family:var(--font-sans);padding:20px;box-sizing:border-box;}
  .grid{display:grid;grid-template-columns:1fr 220px;gap:20px;align-items:center;}
  .stack{display:flex;flex-direction:column;gap:6px;}
  .stack > div{display:flex;align-items:baseline;gap:14px;}
  .label{font-family:var(--font-mono);font-size:10px;color:var(--fg-4);width:70px;}
  .h1{font-size:36px;font-weight:600;letter-spacing:-.02em;line-height:1;color:var(--fg-0);}
  .h2{font-size:22px;font-weight:600;letter-spacing:-.01em;color:var(--fg-1);}
  .body{font-size:14px;color:var(--fg-1);line-height:1.45;}
  .meta{font-size:11px;color:var(--fg-3);}
  .sect{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);}
  .name{font-weight:600;font-size:14px;}
  .note{font-size:12px;color:var(--fg-3);margin-top:4px;line-height:1.5;}
  .spec{font-family:var(--font-mono);font-size:11px;color:var(--fg-2);margin-top:8px;}
</style></head>
<body>
<div class="grid">
  <div class="stack">
    <div><span class="label">h1 / 36</span><span class="h1">Run your life</span></div>
    <div><span class="label">h2 / 22</span><span class="h2">Today's summary</span></div>
    <div><span class="label">section</span><span class="sect">Active Conversations</span></div>
    <div><span class="label">body / 14</span><span class="body">Your AI ran 18 automations overnight.</span></div>
    <div><span class="label">meta / 11</span><span class="meta">Updated 2 min ago · synced</span></div>
  </div>
  <div>
    <div class="name">Lexend</div>
    <div class="note">UI face. 300 · 400 · 500 · 600 · 700.</div>
    <div class="spec">var(--font-sans)</div>
  </div>
</div>
</body></html>
