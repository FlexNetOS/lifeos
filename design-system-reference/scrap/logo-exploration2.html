<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body{background:#0a0a0a;color:#fff;font-family:sans-serif;padding:30px;display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;}
  .box{background:#000;border:1px solid #2a2a2a;border-radius:18px;padding:18px;display:flex;flex-direction:column;align-items:center;gap:10px;}
  .label{font-size:11px;color:#9ba1a6;font-family:monospace;}
  svg{display:block;}
</style></head>
<body>
<svg width="0" height="0" style="position:absolute"><defs>
  <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00D4FF"/>
    <stop offset="50%" stop-color="#9B7BFF"/>
    <stop offset="100%" stop-color="#00E676"/>
  </linearGradient>
</defs></svg>

<!-- D: ring node + curved stroke + sharp filled arrowhead -->
<div class="box">
  <svg width="180" height="180" viewBox="-50 -50 100 100">
    <g fill="url(#g)" stroke="url(#g)">
      <g>
        <!-- ring node -->
        <circle cx="0" cy="-32" r="5.2" fill="none" stroke="url(#g)" stroke-width="2.8"/>
        <circle cx="0" cy="-32" r="1.6" fill="url(#g)"/>
        <!-- arrow shaft curving outward to br node -->
        <path d="M 5,-30 C 28,-27 42,-6 32,18" fill="none" stroke="url(#g)" stroke-width="3.4" stroke-linecap="round"/>
        <!-- arrowhead — filled triangle pointing along motion (down-left into br node) -->
        <path d="M 28.5,21 L 36,11 L 34,22 Z" fill="url(#g)" stroke="none"/>
      </g>
      <g transform="rotate(120)">
        <circle cx="0" cy="-32" r="5.2" fill="none" stroke="url(#g)" stroke-width="2.8"/>
        <circle cx="0" cy="-32" r="1.6" fill="url(#g)"/>
        <path d="M 5,-30 C 28,-27 42,-6 32,18" fill="none" stroke="url(#g)" stroke-width="3.4" stroke-linecap="round"/>
        <path d="M 28.5,21 L 36,11 L 34,22 Z" fill="url(#g)" stroke="none"/>
      </g>
      <g transform="rotate(240)">
        <circle cx="0" cy="-32" r="5.2" fill="none" stroke="url(#g)" stroke-width="2.8"/>
        <circle cx="0" cy="-32" r="1.6" fill="url(#g)"/>
        <path d="M 5,-30 C 28,-27 42,-6 32,18" fill="none" stroke="url(#g)" stroke-width="3.4" stroke-linecap="round"/>
        <path d="M 28.5,21 L 36,11 L 34,22 Z" fill="url(#g)" stroke="none"/>
      </g>
    </g>
  </svg>
  <div class="label">D · stroke + tri-head</div>
</div>

<!-- E: tapered filled arrows (single closed path per arrow) -->
<div class="box">
  <svg width="180" height="180" viewBox="-50 -50 100 100">
    <g fill="url(#g)" stroke="none">
      <g>
        <!-- ring node -->
        <circle cx="0" cy="-32" r="5.2" fill="none" stroke="url(#g)" stroke-width="2.8"/>
        <circle cx="0" cy="-32" r="1.6" fill="url(#g)"/>
        <!-- filled tapered arrow: outer edge curves from upper-right of top node out and down,
             ends with sharp tip pointing into br node, inner edge curves back -->
        <path d="
          M 4,-34
          C 32,-32  46,-8  36,20
          L 32,12
          C 38,-4  24,-22  3,-26
          Z" />
      </g>
      <g transform="rotate(120)">
        <circle cx="0" cy="-32" r="5.2" fill="none" stroke="url(#g)" stroke-width="2.8"/>
        <circle cx="0" cy="-32" r="1.6" fill="url(#g)"/>
        <path d="M 4,-34 C 32,-32 46,-8 36,20 L 32,12 C 38,-4 24,-22 3,-26 Z" />
      </g>
      <g transform="rotate(240)">
        <circle cx="0" cy="-32" r="5.2" fill="none" stroke="url(#g)" stroke-width="2.8"/>
        <circle cx="0" cy="-32" r="1.6" fill="url(#g)"/>
        <path d="M 4,-34 C 32,-32 46,-8 36,20 L 32,12 C 38,-4 24,-22 3,-26 Z" />
      </g>
    </g>
  </svg>
  <div class="label">E · tapered fill</div>
</div>

<!-- F: tapered + reversed direction (arrows going counter-clockwise to test orientation) -->
<div class="box">
  <svg width="180" height="180" viewBox="-50 -50 100 100">
    <g fill="url(#g)" stroke="none">
      <g>
        <circle cx="0" cy="-32" r="5.5" fill="none" stroke="url(#g)" stroke-width="3"/>
        <circle cx="0" cy="-32" r="1.8" fill="url(#g)"/>
        <!-- arrow now going from top node OUT LEFT and DOWN to bl node -->
        <path d="
          M -4,-34
          C -32,-32  -46,-8  -36,20
          L -32,12
          C -38,-4  -24,-22  -3,-26
          Z" />
      </g>
      <g transform="rotate(120)">
        <circle cx="0" cy="-32" r="5.5" fill="none" stroke="url(#g)" stroke-width="3"/>
        <circle cx="0" cy="-32" r="1.8" fill="url(#g)"/>
        <path d="M -4,-34 C -32,-32 -46,-8 -36,20 L -32,12 C -38,-4 -24,-22 -3,-26 Z" />
      </g>
      <g transform="rotate(240)">
        <circle cx="0" cy="-32" r="5.5" fill="none" stroke="url(#g)" stroke-width="3"/>
        <circle cx="0" cy="-32" r="1.8" fill="url(#g)"/>
        <path d="M -4,-34 C -32,-32 -46,-8 -36,20 L -32,12 C -38,-4 -24,-22 -3,-26 Z" />
      </g>
    </g>
  </svg>
  <div class="label">F · counter-clockwise</div>
</div>

</body></html>
