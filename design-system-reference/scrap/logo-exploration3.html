<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body{background:#0a0a0a;color:#fff;font-family:sans-serif;padding:30px;display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;}
  .box{background:#000;border:1px solid #2a2a2a;border-radius:18px;padding:18px;display:flex;flex-direction:column;align-items:center;gap:10px;}
  .label{font-size:11px;color:#9ba1a6;font-family:monospace;}
  .ref{background:#fff;color:#000;}
</style></head>
<body>

<svg width="0" height="0" style="position:absolute"><defs>
  <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00D4FF"/>
    <stop offset="50%" stop-color="#9B7BFF"/>
    <stop offset="100%" stop-color="#00E676"/>
  </linearGradient>
</defs></svg>

<!-- REFERENCE for compare -->
<div class="box ref">
  <img src="ea-emblem-zoom.png" width="180" height="180" style="background:#fff">
  <div class="label" style="color:#999">REF · Element Ark</div>
</div>

<!-- G: triangular pinwheel — each arrow is one filled blade along a triangle side -->
<div class="box">
  <svg width="180" height="180" viewBox="-50 -50 100 100">
    <g fill="url(#g)" stroke="none">
      <g>
        <!-- ring node at top -->
        <circle cx="0" cy="-32" r="5.5" fill="none" stroke="url(#g)" stroke-width="3"/>
        <circle cx="0" cy="-32" r="1.7" fill="url(#g)"/>
        <!-- arrow blade: start from upper-left of top node, sweep down-LEFT to bl,
             outline traces outside of triangle then arrow tip then inside back -->
        <path d="
          M -4,-31
          Q -10,-30 -14,-26
          C -28,-12 -32,4 -32,18
          L -26,8
          L -22,18
          L -24,8
          C -22,-4 -16,-16 -8,-22
          Q -4,-26 -3,-30
          Z" />
      </g>
      <g transform="rotate(120)">
        <circle cx="0" cy="-32" r="5.5" fill="none" stroke="url(#g)" stroke-width="3"/>
        <circle cx="0" cy="-32" r="1.7" fill="url(#g)"/>
        <path d="M -4,-31 Q -10,-30 -14,-26 C -28,-12 -32,4 -32,18 L -26,8 L -22,18 L -24,8 C -22,-4 -16,-16 -8,-22 Q -4,-26 -3,-30 Z" />
      </g>
      <g transform="rotate(240)">
        <circle cx="0" cy="-32" r="5.5" fill="none" stroke="url(#g)" stroke-width="3"/>
        <circle cx="0" cy="-32" r="1.7" fill="url(#g)"/>
        <path d="M -4,-31 Q -10,-30 -14,-26 C -28,-12 -32,4 -32,18 L -26,8 L -22,18 L -24,8 C -22,-4 -16,-16 -8,-22 Q -4,-26 -3,-30 Z" />
      </g>
    </g>
  </svg>
  <div class="label">G · triangle pinwheel v1</div>
</div>

<!-- H: thinner triangle blade with clearer arrowhead -->
<div class="box">
  <svg width="180" height="180" viewBox="-50 -50 100 100">
    <g>
      <g>
        <!-- ring node -->
        <circle cx="0" cy="-30" r="5.2" fill="none" stroke="url(#g)" stroke-width="2.6"/>
        <circle cx="0" cy="-30" r="1.6" fill="url(#g)"/>
        <!-- blade: 
             outer edge (long): from upper-left of top sweeping down to bottom-left vertex area,
             then ARROWHEAD: sharp inward tip pointing at bl node,
             inner edge: shorter curve back near top node -->
        <path fill="url(#g)" stroke="none" d="
          M -4,-29
          C -22,-22 -32,-6 -34,12
          L -28,18
          L -23,10
          C -23,-2 -16,-15 -7,-22
          Z" />
      </g>
      <g transform="rotate(120)">
        <circle cx="0" cy="-30" r="5.2" fill="none" stroke="url(#g)" stroke-width="2.6"/>
        <circle cx="0" cy="-30" r="1.6" fill="url(#g)"/>
        <path fill="url(#g)" stroke="none" d="M -4,-29 C -22,-22 -32,-6 -34,12 L -28,18 L -23,10 C -23,-2 -16,-15 -7,-22 Z" />
      </g>
      <g transform="rotate(240)">
        <circle cx="0" cy="-30" r="5.2" fill="none" stroke="url(#g)" stroke-width="2.6"/>
        <circle cx="0" cy="-30" r="1.6" fill="url(#g)"/>
        <path fill="url(#g)" stroke="none" d="M -4,-29 C -22,-22 -32,-6 -34,12 L -28,18 L -23,10 C -23,-2 -16,-15 -7,-22 Z" />
      </g>
    </g>
  </svg>
  <div class="label">H · thinner blade</div>
</div>

<!-- I: stroke + tip — back to clean stroke with very explicit arrowhead -->
<div class="box">
  <svg width="180" height="180" viewBox="-50 -50 100 100">
    <g>
      <g>
        <circle cx="0" cy="-30" r="5.2" fill="none" stroke="url(#g)" stroke-width="2.6"/>
        <circle cx="0" cy="-30" r="1.6" fill="url(#g)"/>
        <!-- stroke shaft -->
        <path fill="none" stroke="url(#g)" stroke-width="3.4" stroke-linecap="round" d="
          M -4,-29
          C -22,-22 -32,-6 -30,14"/>
        <!-- arrowhead pointing toward bl node (-26, 17), tangent direction is roughly (-1, +3) normalized -->
        <path fill="url(#g)" stroke="none" d="M -30,14 L -24,12 L -27,21 Z"/>
      </g>
      <g transform="rotate(120)">
        <circle cx="0" cy="-30" r="5.2" fill="none" stroke="url(#g)" stroke-width="2.6"/>
        <circle cx="0" cy="-30" r="1.6" fill="url(#g)"/>
        <path fill="none" stroke="url(#g)" stroke-width="3.4" stroke-linecap="round" d="M -4,-29 C -22,-22 -32,-6 -30,14"/>
        <path fill="url(#g)" stroke="none" d="M -30,14 L -24,12 L -27,21 Z"/>
      </g>
      <g transform="rotate(240)">
        <circle cx="0" cy="-30" r="5.2" fill="none" stroke="url(#g)" stroke-width="2.6"/>
        <circle cx="0" cy="-30" r="1.6" fill="url(#g)"/>
        <path fill="none" stroke="url(#g)" stroke-width="3.4" stroke-linecap="round" d="M -4,-29 C -22,-22 -32,-6 -30,14"/>
        <path fill="url(#g)" stroke="none" d="M -30,14 L -24,12 L -27,21 Z"/>
      </g>
    </g>
  </svg>
  <div class="label">I · stroke + arrowhead</div>
</div>

</body></html>
