<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body{background:#0a0a0a;color:#fff;font-family:sans-serif;padding:30px;display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;}
  .box{background:#000;border:1px solid #2a2a2a;border-radius:18px;padding:18px;display:flex;flex-direction:column;align-items:center;gap:10px;}
  .label{font-size:11px;color:#9ba1a6;font-family:monospace;}
  .ref{background:#fff;color:#000;}
</style></head>
<body>

<svg width="0" height="0" style="position:absolute"><defs>
  <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00D4FF"/>
    <stop offset="50%" stop-color="#9B7BFF"/>
    <stop offset="100%" stop-color="#00E676"/>
  </linearGradient>
</defs></svg>

<!-- REFERENCE for compare -->
<div class="box ref">
  <img src="ea-emblem-zoom.png" width="180" height="180" style="background:#fff">
  <div class="label" style="color:#999">REF</div>
</div>

<!-- J: tapered blade with overshoot arrowhead past next node -->
<div class="box">
  <svg width="180" height="180" viewBox="-50 -50 100 100">
    <g>
      <!-- arrow blade, then ring nodes on top (so blade tails appear behind ring) -->
      <g>
        <!-- Single blade: from top node area, curving down-left, OVERSHOOTING the bl node,
             ending with arrowhead tip past it. -->
        <path fill="url(#g)" stroke="none" d="
          M -3,-26
          C -16,-22 -27,-10 -30,8
          C -31,16 -30,22 -25,24
          L -19,17
          L -21,11
          C -21,-2 -14,-14 -5,-21
          Z"/>
      </g>
      <g transform="rotate(120)">
        <path fill="url(#g)" stroke="none" d="M -3,-26 C -16,-22 -27,-10 -30,8 C -31,16 -30,22 -25,24 L -19,17 L -21,11 C -21,-2 -14,-14 -5,-21 Z"/>
      </g>
      <g transform="rotate(240)">
        <path fill="url(#g)" stroke="none" d="M -3,-26 C -16,-22 -27,-10 -30,8 C -31,16 -30,22 -25,24 L -19,17 L -21,11 C -21,-2 -14,-14 -5,-21 Z"/>
      </g>
      <!-- Ring nodes drawn on top -->
      <g>
        <circle cx="0" cy="-30" r="5" fill="#000"/>
        <circle cx="0" cy="-30" r="5" fill="none" stroke="url(#g)" stroke-width="2.5"/>
        <circle cx="0" cy="-30" r="1.5" fill="url(#g)"/>
      </g>
      <g transform="rotate(120)">
        <circle cx="0" cy="-30" r="5" fill="#000"/>
        <circle cx="0" cy="-30" r="5" fill="none" stroke="url(#g)" stroke-width="2.5"/>
        <circle cx="0" cy="-30" r="1.5" fill="url(#g)"/>
      </g>
      <g transform="rotate(240)">
        <circle cx="0" cy="-30" r="5" fill="#000"/>
        <circle cx="0" cy="-30" r="5" fill="none" stroke="url(#g)" stroke-width="2.5"/>
        <circle cx="0" cy="-30" r="1.5" fill="url(#g)"/>
      </g>
    </g>
  </svg>
  <div class="label">J · tapered + overshoot</div>
</div>

<!-- K: ditto but slightly thinner blade -->
<div class="box">
  <svg width="180" height="180" viewBox="-50 -50 100 100">
    <g>
      <g>
        <path fill="url(#g)" stroke="none" d="
          M -3,-26
          C -16,-22 -25,-10 -28,8
          C -29,16 -28,22 -23,24
          L -19,18
          L -22,12
          C -21,-1 -14,-13 -5,-20
          Z"/>
      </g>
      <g transform="rotate(120)"><path fill="url(#g)" stroke="none" d="M -3,-26 C -16,-22 -25,-10 -28,8 C -29,16 -28,22 -23,24 L -19,18 L -22,12 C -21,-1 -14,-13 -5,-20 Z"/></g>
      <g transform="rotate(240)"><path fill="url(#g)" stroke="none" d="M -3,-26 C -16,-22 -25,-10 -28,8 C -29,16 -28,22 -23,24 L -19,18 L -22,12 C -21,-1 -14,-13 -5,-20 Z"/></g>
      <g>
        <circle cx="0" cy="-30" r="5" fill="#000"/>
        <circle cx="0" cy="-30" r="5" fill="none" stroke="url(#g)" stroke-width="2.5"/>
        <circle cx="0" cy="-30" r="1.5" fill="url(#g)"/>
      </g>
      <g transform="rotate(120)"><circle cx="0" cy="-30" r="5" fill="#000"/><circle cx="0" cy="-30" r="5" fill="none" stroke="url(#g)" stroke-width="2.5"/><circle cx="0" cy="-30" r="1.5" fill="url(#g)"/></g>
      <g transform="rotate(240)"><circle cx="0" cy="-30" r="5" fill="#000"/><circle cx="0" cy="-30" r="5" fill="none" stroke="url(#g)" stroke-width="2.5"/><circle cx="0" cy="-30" r="1.5" fill="url(#g)"/></g>
    </g>
  </svg>
  <div class="label">K · thinner blade</div>
</div>

</body></html>
